version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8001
    volumes:
      - ./frontend/src:/app/src
    networks:
      - justbet

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend:/app
    networks:
      - justbet

  ws:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.ws_server:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend:/app
    networks:
      - justbet

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: justbet
      POSTGRES_PASSWORD: justbet_secret
      POSTGRES_DB: justbet
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U justbet"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - justbet

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - justbet

volumes:
  pgdata:

networks:
  justbet:
    driver: bridge
