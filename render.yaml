# ============================================================================
# JustBet Sportsbook — Render Blueprint (v2 Kenya Localized)
# Built by P.o.Riot | Credits P.o.Riot
# ============================================================================
# Deploy: Connect this repo to Render Dashboard → Blueprints.
# Render auto-detects render.yaml and provisions all services.
# Docs: https://render.com/docs/blueprint-spec
# ============================================================================

envVarGroups:
  # Shared secrets and config across all services
  - name: justbet-shared
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: FIRST_ADMIN_PHONE
        sync: false
      - key: FIRST_ADMIN_PIN
        sync: false
      - key: ADMIN_SECRET_TOKEN
        generateValue: true
      - key: DEFAULT_CURRENCY
        value: KES

databases:
  # --------------------------------------------------------------------------
  # PostgreSQL — Primary data store (users, wallets, tickets, matches)
  # --------------------------------------------------------------------------
  - name: justbet-db
    plan: starter
    databaseName: justbet
    user: justbet
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  # --------------------------------------------------------------------------
  # 1. STATIC SITE — React Frontend (Vite → dist)
  # --------------------------------------------------------------------------
  - type: web
    name: justbet-frontend
    runtime: static
    plan: starter
    repo: https://github.com/baristamcdough-hash/justbet
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://justbet-api.onrender.com
      - key: VITE_WS_URL
        value: wss://justbet-api.onrender.com/ws/odds
      - key: NODE_VERSION
        value: "20"

  # --------------------------------------------------------------------------
  # 2. WEB SERVICE — FastAPI REST API + WebSocket (Starter for persistent WS)
  # --------------------------------------------------------------------------
  - type: web
    name: justbet-api
    runtime: python
    plan: starter
    region: oregon
    repo: https://github.com/baristamcdough-hash/justbet
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2 --ws websockets
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # ── Database ──
      - key: DATABASE_URL
        fromDatabase:
          name: justbet-db
          property: connectionString
      # ── Redis ──
      - key: REDIS_URL
        fromService:
          name: justbet-redis
          type: redis
          property: connectionString
      # ── Shared secrets (from env group) ──
      - fromGroup: justbet-shared
      # ── Application ──
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: APP_NAME
        value: JustBet
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.3"
      # ── CORS ──
      - key: CORS_ORIGINS
        value: https://justbet-frontend.onrender.com
      # ── Rate Limiting ──
      - key: RATE_LIMIT_AUTH
        value: "100"
      - key: RATE_LIMIT_ANON
        value: "30"
      # ── Kenya Locale ──
      - key: MIN_STAKE
        value: "50"
      - key: MAX_STAKE
        value: "500000"
      - key: MIN_DEPOSIT
        value: "100"
      - key: MAX_DEPOSIT
        value: "150000"
      - key: MIN_WITHDRAWAL
        value: "100"
      - key: MAX_WITHDRAWAL
        value: "70000"

  # --------------------------------------------------------------------------
  # 3. BACKGROUND WORKER — Settlement processor & async payout engine
  # --------------------------------------------------------------------------
  - type: worker
    name: justbet-settlement-worker
    runtime: python
    plan: starter
    region: oregon
    repo: https://github.com/baristamcdough-hash/justbet
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.worker
    autoDeploy: true
    envVars:
      # ── Database ──
      - key: DATABASE_URL
        fromDatabase:
          name: justbet-db
          property: connectionString
      # ── Redis ──
      - key: REDIS_URL
        fromService:
          name: justbet-redis
          type: redis
          property: connectionString
      # ── Shared secrets (from env group) ──
      - fromGroup: justbet-shared
      # ── Application ──
      - key: APP_NAME
        value: JustBet
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.3"
      # ── Worker Config ──
      - key: WORKER_POLL_INTERVAL
        value: "5"
      - key: WORKER_MAX_RETRIES
        value: "3"

  # --------------------------------------------------------------------------
  # 4. REDIS — Pub/Sub broker + live odds cache
  # --------------------------------------------------------------------------
  - type: redis
    name: justbet-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
