# ============================================================================
# JustBet Sportsbook — Render Blueprint (Infrastructure-as-Code)
# Built by P.o.Riot | Credits P.o.Riot
# ============================================================================
# Deploy: Connect this repo to Render, and this file auto-provisions all
# services, databases, and environment variables via Render Blueprints.
# Docs: https://render.com/docs/blueprint-spec
# ============================================================================

databases:
  # --------------------------------------------------------------------------
  # PostgreSQL — Primary data store for users, wallets, tickets, matches
  # --------------------------------------------------------------------------
  - name: justbet-db
    plan: basic
    databaseName: justbet
    user: justbet
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []  # Only internal services can connect

services:
  # --------------------------------------------------------------------------
  # 1. STATIC SITE — React Frontend (Vite build)
  # --------------------------------------------------------------------------
  - type: web
    name: justbet-frontend
    runtime: static
    plan: starter
    region: oregon
    repo: https://github.com/baristamcdough-hash/justbet
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: justbet-api
          type: web
          property: url
      - key: VITE_WS_URL
        fromService:
          name: justbet-api
          type: web
          envVarKey: RENDER_WS_URL
      - key: NODE_VERSION
        value: "20"

  # --------------------------------------------------------------------------
  # 2. WEB SERVICE — FastAPI REST API + WebSocket (Starter tier for persistent WS)
  # --------------------------------------------------------------------------
  - type: web
    name: justbet-api
    runtime: python
    plan: starter
    region: oregon
    repo: https://github.com/baristamcdough-hash/justbet
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2 --ws websockets
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Database — references the Render-managed Postgres instance
      - key: DATABASE_URL
        fromDatabase:
          name: justbet-db
          property: connectionString
        # Note: Render provides postgresql:// — our app needs postgresql+asyncpg://
        # We handle this via a transform in the app config or prestart script
      - key: DATABASE_URL_INTERNAL
        fromDatabase:
          name: justbet-db
          property: internalConnectionString
      # Redis — references the Render Key-Value store
      - key: REDIS_URL
        fromService:
          name: justbet-redis
          type: redis
          property: connectionString
      - key: REDIS_INTERNAL_URL
        fromService:
          name: justbet-redis
          type: redis
          property: internalConnectionString
      # JWT & Security
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      # Application
      - key: APP_NAME
        value: JustBet
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.3"
      # CORS — allows frontend origin
      - key: CORS_ORIGINS
        fromService:
          name: justbet-frontend
          type: web
          property: url
      # WebSocket public URL (for frontend to connect)
      - key: RENDER_WS_URL
        value: wss://justbet-api.onrender.com/ws/odds
      # Rate Limiting
      - key: RATE_LIMIT_AUTH
        value: "100"
      - key: RATE_LIMIT_ANON
        value: "30"

  # --------------------------------------------------------------------------
  # 3. BACKGROUND WORKER — Settlement processor & async payout engine
  # --------------------------------------------------------------------------
  - type: worker
    name: justbet-settlement-worker
    runtime: python
    plan: starter
    region: oregon
    repo: https://github.com/baristamcdough-hash/justbet
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.worker
    autoDeploy: true
    envVars:
      # Database — uses internal networking for low-latency DB access
      - key: DATABASE_URL
        fromDatabase:
          name: justbet-db
          property: internalConnectionString
      # Redis — uses internal networking
      - key: REDIS_URL
        fromService:
          name: justbet-redis
          type: redis
          property: internalConnectionString
      # JWT (needed for token validation in shared codebase)
      - key: JWT_SECRET
        fromService:
          name: justbet-api
          type: web
          envVarKey: JWT_SECRET
      - key: JWT_ALGORITHM
        value: HS256
      # Application
      - key: APP_NAME
        value: JustBet
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.3"
      # Worker-specific config
      - key: WORKER_POLL_INTERVAL
        value: "5"
      - key: WORKER_MAX_RETRIES
        value: "3"

# --------------------------------------------------------------------------
# 4. REDIS KEY-VALUE STORE — Pub/Sub broker + live odds cache
# --------------------------------------------------------------------------
keyValueStores:
  - name: justbet-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # Only internal services can connect
